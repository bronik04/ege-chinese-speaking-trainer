server {
    listen 80;
    server_name trainer.example.ru;

    # ACME http-01 challenge должен отвечать до редиректа, иначе сертификат
    # нельзя ни выпустить, ни продлить.
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        # Домен задан явно: $host берётся из запроса и превратил бы этот блок
        # в открытый редирект.
        return 301 https://trainer.example.ru$request_uri;
    }
}

server {
    listen 443 ssl;
    http2 on;
    server_name trainer.example.ru;
    ssl_certificate /etc/letsencrypt/live/trainer.example.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/trainer.example.ru/privkey.pem;
    client_max_body_size 16m;
    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_read_timeout 30s;
    }
}
