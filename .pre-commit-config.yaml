repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: check-yaml
  - repo: local
    hooks:
      - id: ruff
        name: Ruff
        entry: python -m ruff check .
        language: system
        pass_filenames: false
        types: [python]
      - id: ruff-format
        name: Ruff format
        entry: python -m ruff format --check .
        language: system
        pass_filenames: false
        types: [python]
      - id: eslint
        name: ESLint
        entry: npm run lint:js
        language: system
        pass_filenames: false
        types: [javascript]
      - id: check-json
        name: Check JSON
        entry: python -m scripts.check_json
        language: system
        types: [json]
      - id: validate-content
        name: Validate content schemas and assets
        entry: python -m scripts.validate_content
        language: system
        pass_filenames: false
        files: ^(content/|public/assets/variants/|schemas/|scripts/validate_content\.py$)
      - id: repository-hygiene
        name: Check repository hygiene
        entry: python -m scripts.check_repository_hygiene
        language: system
        pass_filenames: false
