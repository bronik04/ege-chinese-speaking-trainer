repos:
  - repo: local
    hooks:
      - id: ruff
        name: Ruff
        entry: ruff check .
        language: system
        pass_filenames: false
        types: [python]
      - id: eslint
        name: ESLint
        entry: npm run lint:js
        language: system
        pass_filenames: false
        types: [javascript]
      - id: check-json
        name: Check JSON
        entry: python -m scripts.check_json
        language: system
        types: [json]
