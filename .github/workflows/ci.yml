name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: trainer_test
          POSTGRES_USER: trainer
          POSTGRES_PASSWORD: trainer-test-password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U trainer -d trainer_test"
          --health-interval 5s --health-timeout 3s --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - name: Install system tools
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg postgresql-client
          pg_dump --version | grep -q " 16\."
      - name: Install development tools
        run: |
          python3 -m pip install -r requirements-dev.txt
          python3 -m pip install --no-deps --no-build-isolation -e .
          npm ci
      - name: Quality gate
        run: PATH="$(python -c 'import sys; print(sys.prefix)')/bin:$PATH" python -m pre_commit run --all-files
      - name: Test unit layer
        run: |
          python -m coverage erase
          make test-unit PYTHON=python PYTHON_TEST="python -m coverage run -m unittest"
      - name: Test integration layer and coverage
        run: |
          make test-integration PYTHON=python PYTHON_TEST="python -m coverage run --append -m unittest"
          python -m coverage report
      - name: Smoke test FastAPI runtime
        run: |
          python -m uvicorn asgi:app --host 127.0.0.1 --port 8080 &
          server_pid=$!
          trap 'kill "$server_pid"' EXIT
          for attempt in {1..30}; do
            if curl -fsS http://127.0.0.1:8080/api/health; then
              exit 0
            fi
            sleep 1
          done
          exit 1
      - name: Install E2E browser
        run: npx playwright install --with-deps chromium
      - name: Test browser workflow
        env:
          E2E_PYTHON: python
        run: npm run test:e2e
      - name: Test PostgreSQL adapter
        env:
          TEST_DATABASE_URL: postgresql://trainer:trainer-test-password@127.0.0.1:5432/trainer_test
        run: |
          python -m unittest tests.integration.test_migrations -v
          python -m scripts.postgres_smoke
          python -m scripts.postgres_restore_smoke
      - name: Test S3 adapter with MinIO
        env:
          AWS_ACCESS_KEY_ID: minioadmin
          AWS_SECRET_ACCESS_KEY: minioadmin
          AWS_DEFAULT_REGION: us-east-1
          TRAINER_S3_ENDPOINT_URL: http://127.0.0.1:9000
          TRAINER_S3_BUCKET: trainer-audio-test
        run: |
          docker run -d --name minio -p 9000:9000 -e MINIO_ROOT_USER=minioadmin -e MINIO_ROOT_PASSWORD=minioadmin minio/minio:latest server /data
          for attempt in {1..30}; do curl -fsS http://127.0.0.1:9000/minio/health/live && break; sleep 1; done
          python -m scripts.s3_smoke
      - name: Validate Docker image
        run: |
          make docker-check
          make docker-build
