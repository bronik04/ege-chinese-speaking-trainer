name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: trainer_test
          POSTGRES_USER: trainer
          POSTGRES_PASSWORD: trainer-test-password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U trainer -d trainer_test"
          --health-interval 5s --health-timeout 3s --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - name: Install system tools
        run: sudo apt-get update && sudo apt-get install -y ffmpeg postgresql-client
      - name: Install development tools
        run: |
          python3 -m pip install -r requirements-dev.txt
          npm ci
      - name: Lint
        run: |
          ruff check .
          npm run lint:js
      - name: Test JavaScript
        run: npm test
      - name: Install E2E browser
        run: npx playwright install --with-deps chromium
      - name: Test browser workflow
        env:
          E2E_PYTHON: python
        run: npm run test:e2e
      - name: Test Python with coverage
        run: |
          coverage run -m unittest discover -s tests -v
          coverage report
      - name: Test PostgreSQL adapter
        env:
          TEST_DATABASE_URL: postgresql://trainer:trainer-test-password@127.0.0.1:5432/trainer_test
        run: |
          python -m scripts.postgres_smoke
          python -m scripts.postgres_restore_smoke
      - name: Test S3 adapter with MinIO
        env:
          AWS_ACCESS_KEY_ID: minioadmin
          AWS_SECRET_ACCESS_KEY: minioadmin
          AWS_DEFAULT_REGION: us-east-1
          TRAINER_S3_ENDPOINT_URL: http://127.0.0.1:9000
          TRAINER_S3_BUCKET: trainer-audio-test
        run: |
          docker run -d --name minio -p 9000:9000 -e MINIO_ROOT_USER=minioadmin -e MINIO_ROOT_PASSWORD=minioadmin minio/minio:latest server /data
          for attempt in {1..30}; do curl -fsS http://127.0.0.1:9000/minio/health/live && break; sleep 1; done
          python -m scripts.s3_smoke
      - name: Validate Docker image
        run: docker build -t chinese-speaking-trainer:test .
