name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Check JavaScript
        run: node --check app.js && node --check js/api.js && node --check js/progress.js && node --check js/review.js
      - name: Run tests
        run: python3 -m unittest discover -s tests -v
