services:
  app:
    build: .
    restart: unless-stopped
    env_file: .env
    volumes:
      - trainer_data:/app/var
      - ./backups:/app/backups
    expose: ["8080"]
  transcription-worker:
    profiles: ["transcription"]
    build: .
    restart: unless-stopped
    command: ["python", "-m", "scripts.transcription_worker"]
    env_file: .env
    depends_on: [app]
    volumes:
      - trainer_data:/app/var
  caddy:
    image: caddy:2.10-alpine
    restart: unless-stopped
    depends_on: [app]
    environment:
      DOMAIN: ${DOMAIN}
    ports: ["80:80", "443:443", "443:443/udp"]
    volumes:
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
volumes:
  trainer_data:
  caddy_data:
  caddy_config:
